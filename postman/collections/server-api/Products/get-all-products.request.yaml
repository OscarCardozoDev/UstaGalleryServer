$kind: http-request
name: 'Get All Products'
method: GET
url: '{{baseUrl}}/products/getAll'
order: 2000
queryParams:
  - key: page
    value: '1'
    description: 'Page number (default 1)'
  - key: limit
    value: '10'
    description: 'Items per page (default 10)'
  - key: styleId
    value: ''
    description: 'Optional style UUID filter'
    disabled: true
